<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online 2R - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #FFF8F3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        :root {
            --orange-primary: #FF6B00;
            --orange-secondary: #FF8C32;
            --orange-light: #FFA95C;
            --orange-pale: #FFF0E5;
            --orange-gradient: linear-gradient(135deg, #FF6B00, #FF8C32);
            --gray-500: #9E9E9E;
            --gray-700: #616161;
            --gray-900: #333333;
            --error: #F44336;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.2);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid #f0f0f0;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo i {
            font-size: 48px;
            color: var(--orange-primary);
            display: block;
            margin-bottom: 10px;
        }
        .login-logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--gray-900);
        }
        .login-logo h1 span {
            color: var(--orange-primary);
        }
        .login-logo p {
            color: var(--gray-500);
            font-size: 14px;
            margin-top: 5px;
        }

        .login-error {
            display: none;
            background: #FFEBEE;
            color: var(--error);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }
        .login-error i { font-size: 18px; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-900);
            margin-bottom: 6px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: var(--radius-md);
            padding: 0 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--orange-primary);
            background: white;
        }
        .input-group i {
            color: var(--gray-500);
            font-size: 18px;
        }
        .input-group input {
            border: none;
            background: transparent;
            padding: 15px 12px;
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }
        .input-group input::placeholder {
            color: #bbb;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--orange-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,107,0,0.4);
        }

        .login-footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: var(--gray-500);
        }
        .login-footer-text p {
            margin-bottom: 3px;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }
        .loader {
            width: 50px; height: 50px;
            border: 5px solid var(--orange-pale);
            border-top: 5px solid var(--orange-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            min-width: 280px;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: var(--error); }
        .toast.warning { background: #FF9800; }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .login-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader"><div class="loader"></div></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Login Page -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-store-alt"></i>
                <h1>Toko Online <span>2R</span></h1>
                <p>Platform Belanja & Layanan Serba Ada</p>
            </div>

            <div class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="loginErrorText">Username atau password salah!</span>
            </div>

            <form class="login-form" id="loginForm" onsubmit="prosesLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <button type="submit" class="btn-login" id="btnLoginSubmit">
                        <i class="fas fa-sign-in-alt"></i> Masuk
                    </button>
                </div>
            </form>

            <div class="login-footer-text">
                <p>🔒 Sistem Multi-Akun Terproteksi</p>
                <p style="font-size: 11px; margin-top: 5px;">Hanya SuperAdmin & Staf yang dapat mendaftarkan akun baru</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATA DUMMY AKUN (Username & Password tersimpan di sini)
        // ============================================
        const DATA_AKUN = [
            { username: 'superadmin', password: 'rahasia123', nama: 'SuperAdmin', role: 'SuperAdmin' },
            { username: 'admin', password: 'admin123', nama: 'Admin Utama', role: 'Staf' },
            { username: 'toko1', password: 'tokopass', nama: 'Toko Berkah', role: 'Toko' },
            { username: 'ojek1', password: 'ojekpass', nama: 'Budi Driver', role: 'Ojek' },
            { username: 'customer1', password: 'cust123', nama: 'Rina Customer', role: 'Customer' },
            // Tambah akun lain sesuai kebutuhan
        ];

        // ============================================
        // FUNGSI TOAST
        // ============================================
        function tampilkanToast(pesan, tipe = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${tipe}`;
            const icon = tipe === 'success' ? 'fa-check-circle' : tipe === 'error' ? 'fa-times-circle' : 'fa-exclamation-triangle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${pesan}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================
        // FUNGSI LOGIN
        // ============================================
        function prosesLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');

            // Reset error
            errorDiv.style.display = 'none';

            // Cari akun
            const user = DATA_AKUN.find(u => u.username === username && u.password === password);

            if (user) {
                // Login berhasil
                tampilkanToast('Selamat datang, ' + user.nama + '!', 'success');

                // Simpan session (misal di localStorage)
                localStorage.setItem('2r_user', JSON.stringify({ username: user.username, nama: user.nama, role: user.role }));

                // Redirect ke dashboard (sementara hanya alert)
                setTimeout(() => {
                    alert('Login berhasil! Anda akan diarahkan ke dashboard.\n\nUsername: ' + user.username + '\nRole: ' + user.role);
                    // Di sini Anda bisa mengarahkan ke halaman dashboard
                    // window.location.href = 'dashboard.html';
                }, 500);

                // Kosongkan form
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            } else {
                // Login gagal
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Username atau password salah!';
                tampilkanToast('Username atau password salah!', 'error');
            }
        }

        // ============================================
        // PRELOADER HILANG
        // ============================================
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 500);
        });

        // ============================================
        // CEK APAKAH SUDAH LOGIN (Opsional)
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            const stored = localStorage.getItem('2r_user');
            if (stored) {
                const user = JSON.parse(stored);
                // Jika sudah login, bisa langsung redirect
                // alert('Anda sudah login sebagai ' + user.nama);
            }
        });

        console.log('✅ File pembukaan login siap.');
    </script>

</body>
</html>
