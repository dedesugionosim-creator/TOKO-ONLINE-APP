<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TOKO ONLINE 2R</title>
    <style>
        /* ===== GAYA DASAR ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #ffe6cc 100%);
        }

        /* ===== KONTENER UTAMA ===== */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.2);
            border: 2px solid #ff8c42;
        }

        /* ===== HEADER DAN LOGO ===== */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 700;
            color: #ff6600;
            letter-spacing: 1px;
        }

        .logo-sub {
            font-size: 16px;
            color: #ff944d;
            margin-top: 5px;
        }

        /* ===== FORMULIR INPUT ===== */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffcc99;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fffaf5;
        }

        .input-group input:focus {
            border-color: #ff6600;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }

        /* ===== TOMBOL ===== */
        .button-group {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #ff6600;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border: 2px solid #ff6600;
        }

        .btn-login:hover {
            background-color: #e65c00;
            border-color: #e65c00;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #ff6600;
            border: 2px solid #ff6600;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background-color: #fff0e0;
        }

        /* ===== PESAN ERROR ===== */
        .error-message {
            color: #d32f2f;
            background-color: #fdecea;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ===== FOOTER TEKS ===== */
        .note {
            text-align: center;
            font-size: 12px;
            color: #888888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-text">TOKO ONLINE 2R</div>
            <div class="logo-sub">Pasar Digital Terpercaya</div>
        </div>

        <!-- Tempat Pesan Error -->
        <div id="errorBox" class="error-message"></div>

        <!-- Form Login -->
        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-login">Masuk</button>
                <button type="button" class="btn-register" onclick="window.location.href='daftar.html'">Daftar Akun Baru</button>
            </div>
        </form>

        <div class="note">Tidak dapat mengakses akun? Hubungi Customer Service</div>
    </div>

    <script>
        /* ===== DATA KREDENSIAL TERSEMBUNYI DALAM KODE ===== */
        // SuperAdmin (tidak dapat diubah dari sini)
        const SUPERADMIN_USERNAME = "AppTkOnline2R";
        const SUPERADMIN_PASSWORD = "MyHand0286";

        // Data Dummy Pengguna Figur 2 (sementara hingga ada backend)
        // Status: 'active' untuk customer, 'pending' untuk toko/ojek
        const dummyUsers = [
            {
                id: "CUST-001",
                nama: "Budi Santoso",
                alamat: "Jl. Melati No. 10",
                hp: "081234567890",
                email: "budi@email.com",
                username: "customer1",
                password: "pass123",
                peran: "Customer",
                status: "active"
            },
            {
                id: "TOKO-001",
                nama: "Sumber Rejeki Grosir",
                alamat: "Pasar Induk Blok A",
                hp: "082198765432",
                email: "grosir@email.com",
                username: "tokogrosir1",
                password: "pass123",
                peran: "Toko Grosir",
                status: "pending"
            },
            {
                id: "TOKO-002",
                nama: "Warung Makan Enak",
                alamat: "Jl. Kenanga No. 5",
                hp: "085611112222",
                email: "makanan@email.com",
                username: "makanan1",
                password: "pass123",
                peran: "Penyedia Makanan/Minuman",
                status: "pending"
            },
            {
                id: "OJEK-001",
                nama: "Anton Kurniawan",
                alamat: "Gg. Anggrek No. 3",
                hp: "087733334444",
                email: "ojek@email.com",
                username: "ojek1",
                password: "pass123",
                peran: "Ojek",
                status: "pending"
            }
        ];

        // Ambil data staf yang telah dibuat SuperAdmin dari localStorage (jika sudah ada)
        function getStaffData() {
            const staffJSON = localStorage.getItem("staff_2r");
            return staffJSON ? JSON.parse(staffJSON) : [];
        }

        // Fungsi untuk menampilkan pesan error
        function showError(message) {
            const errorBox = document.getElementById("errorBox");
            errorBox.textContent = message;
            errorBox.classList.add("show");
            // Sembunyikan setelah 4 detik
            setTimeout(() => {
                errorBox.classList.remove("show");
            }, 4000);
        }

        // Proses login ketika form dikirim
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();

            // Reset error
            document.getElementById("errorBox").classList.remove("show");

            // Validasi input kosong
            if (usernameInput === "" || passwordInput === "") {
                showError("Username dan password harus diisi.");
                return;
            }

            // 1. Periksa apakah SuperAdmin yang login
            if (usernameInput === SUPERADMIN_USERNAME && passwordInput === SUPERADMIN_PASSWORD) {
                // Set session sederhana di localStorage (contoh)
                localStorage.setItem("currentUser", JSON.stringify({
                    username: SUPERADMIN_USERNAME,
                    peran: "SuperAdmin",
                    nama: "SuperAdmin"
                }));
                // Arahkan ke dasbor SuperAdmin (Blok 3 nanti)
                window.location.href = "dashboard-superadmin.html";
                return;
            }

            // 2. Periksa di data staf (dari localStorage)
            const staffList = getStaffData();
            const foundStaff = staffList.find(function(staff) {
                return staff.username === usernameInput && staff.password === passwordInput;
            });
            if (foundStaff) {
                localStorage.setItem("currentUser", JSON.stringify({
                    username: foundStaff.username,
                    peran: foundStaff.peran, // "Staf Admin", "Staf Owner Toko", dst.
                    nama: foundStaff.nama,
                    id: foundStaff.id
                }));
                // Arahkan ke dasbor staf (Blok 5 nanti)
                window.location.href = "dashboard-staff.html";
                return;
            }

            // 3. Periksa di data dummy pengguna Figur 2
            const foundUser = dummyUsers.find(function(user) {
                return user.username === usernameInput && user.password === passwordInput;
            });
            if (foundUser) {
                // Simpan sesi
                localStorage.setItem("currentUser", JSON.stringify({
                    id: foundUser.id,
                    nama: foundUser.nama,
                    username: foundUser.username,
                    peran: foundUser.peran,
                    status: foundUser.status
                }));

                // Jika status 'pending' (toko/ojek belum diverifikasi), arahkan ke halaman pengajuan
                if (foundUser.status === "pending") {
                    window.location.href = "dashboard-pengajuan.html";
                } else {
                    // Customer langsung ke dasbor customer
                    window.location.href = "dashboard-customer.html";
                }
                return;
            }

            // Jika tidak cocok sama sekali
            showError("Username atau password salah. Silakan coba lagi.");
        });
    </script>

<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo-text">TOKO ONLINE 2R</div>
            <p>Buat Akun Baru (Figur 2)</p>
        </div>

        <!-- Kotak pesan error/sukses -->
        <div id="messageBox" class="message-box"></div>

        <!-- Form Pendaftaran -->
        <form id="registerForm" autocomplete="off">
            <!-- ID dibuat otomatis, tidak perlu ditampilkan -->

            <div class="input-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="input-group">
                <label for="alamat">Alamat</label>
                <input type="text" id="alamat" name="alamat" placeholder="Masukkan alamat" required>
            </div>

            <div class="input-group">
                <label for="hp">Nomor HP</label>
                <input type="tel" id="hp" name="hp" placeholder="Contoh: 08123456789" required pattern="[0-9]{10,13}">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
            </div>

            <div class="input-group">
                <label for="peran">Pilih Jenis Akun</label>
                <select id="peran" name="peran" required>
                    <option value="">-- Pilih Akun Figur 2 --</option>
                    <option value="Toko Grosir">Toko Grosir</option>
                    <option value="Toko Standar">Toko Standar</option>
                    <option value="Toko Kecil">Toko Kecil</option>
                    <option value="Penyedia Makanan/Minuman">Penyedia Makanan/Minuman</option>
                    <option value="COD Seller">COD Seller</option>
                    <option value="Pedagang Pasar">Pedagang Pasar</option>
                    <option value="Pedagang 2 (Pinggir Jalan)">Pedagang 2 (Pinggir Jalan)</option>
                    <option value="Ojek">Ojek</option>
                    <option value="Customer">Customer</option>
                </select>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Buat username unik" required pattern="[a-zA-Z0-9_]{4,20}">
                <small style="color:#888;">Gunakan 4-20 karakter (huruf, angka, underscore).</small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Buat password" required minlength="6">
                <small style="color:#888;">Minimal 6 karakter.</small>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Daftar Sekarang</button>
                <button type="button" class="btn-back" onclick="window.location.href='index.html'">Kembali ke Login</button>
            </div>
        </form>

        <div class="note">* Customer langsung aktif, toko & ojek perlu verifikasi.</div>
    </div>

    <script>
        /* ===== DATA DUMMY (sama dengan di login untuk sinkron) ===== */
        const dummyUsers = [
            { id: "CUST-001", nama: "Budi Santoso", alamat: "Jl. Melati No. 10", hp: "081234567890", email: "budi@email.com", username: "customer1", password: "pass123", peran: "Customer", status: "active" },
            { id: "TOKO-001", nama: "Sumber Rejeki Grosir", alamat: "Pasar Induk Blok A", hp: "082198765432", email: "grosir@email.com", username: "tokogrosir1", password: "pass123", peran: "Toko Grosir", status: "pending" },
            { id: "TOKO-002", nama: "Warung Makan Enak", alamat: "Jl. Kenanga No. 5", hp: "085611112222", email: "makanan@email.com", username: "makanan1", password: "pass123", peran: "Penyedia Makanan/Minuman", status: "pending" },
            { id: "OJEK-001", nama: "Anton Kurniawan", alamat: "Gg. Anggrek No. 3", hp: "087733334444", email: "ojek@email.com", username: "ojek1", password: "pass123", peran: "Ojek", status: "pending" }
        ];

        // Fungsi untuk mendapatkan data terdaftar dari localStorage
        function getRegisteredUsers() {
            const usersJSON = localStorage.getItem("registered_users_2r");
            return usersJSON ? JSON.parse(usersJSON) : [];
        }

        // Fungsi untuk menyimpan pengguna baru ke localStorage
        function saveRegisteredUser(userObject) {
            const users = getRegisteredUsers();
            users.push(userObject);
            localStorage.setItem("registered_users_2r", JSON.stringify(users));
        }

        // Fungsi untuk membuat ID otomatis berdasarkan peran
        function generateID(peran) {
            const users = getRegisteredUsers();
            // Gabungkan juga dengan dummyUsers untuk menghindari ID bentrok
            const allUsers = dummyUsers.concat(users);
            let prefix = "";
            if (peran === "Customer") prefix = "CUST";
            else if (peran === "Ojek") prefix = "OJEK";
            else prefix = "TOKO"; // semua toko menggunakan TOKO
            // Hitung jumlah yang sudah ada dengan prefix tersebut
            const existingCount = allUsers.filter(u => u.id && u.id.startsWith(prefix)).length;
            const newNumber = existingCount + 1;
            return prefix + "-" + String(newNumber).padStart(3, "0");
        }

        // Fungsi menampilkan pesan
        function showMessage(text, type) {
            const msgBox = document.getElementById("messageBox");
            msgBox.textContent = text;
            msgBox.className = "message-box " + type;
            // Sembunyikan setelah 6 detik
            setTimeout(function() {
                msgBox.className = "message-box";
                msgBox.textContent = "";
            }, 6000);
        }

        // Fungsi pengecekan unik (HP, email, username) terhadap dummyUsers + registeredUsers
        function isUnique(field, value) {
            const dummy = dummyUsers;
            const registered = getRegisteredUsers();
            const all = dummy.concat(registered);
            return !all.some(function(user) {
                return user[field] && user[field].toLowerCase() === value.toLowerCase();
            });
        }

        // Event listener form submit
        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault();

            // Ambil nilai input
            const nama = document.getElementById("nama").value.trim();
            const alamat = document.getElementById("alamat").value.trim();
            const hp = document.getElementById("hp").value.trim();
            const email = document.getElementById("email").value.trim();
            const peran = document.getElementById("peran").value;
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            // Validasi dasar (HTML sudah melakukan required, tapi periksa lagi)
            if (!nama || !alamat || !hp || !email || !peran || !username || !password) {
                showMessage("Semua field wajib diisi.", "error");
                return;
            }

            // Validasi format HP (10-13 digit)
            if (!/^[0-9]{10,13}$/.test(hp)) {
                showMessage("Nomor HP harus 10-13 digit angka.", "error");
                return;
            }

            // Validasi email sederhana
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage("Format email tidak valid.", "error");
                return;
            }

            // Validasi username (4-20 karakter, huruf/angka/underscore)
            if (!/^[a-zA-Z0-9_]{4,20}$/.test(username)) {
                showMessage("Username harus 4-20 karakter (huruf, angka, underscore).", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("Password minimal 6 karakter.", "error");
                return;
            }

            // Cek keunikan HP
            if (!isUnique("hp", hp)) {
                showMessage("Nomor HP sudah terdaftar. Gunakan nomor lain.", "error");
                return;
            }

            // Cek keunikan email
            if (!isUnique("email", email)) {
                showMessage("Email sudah terdaftar. Gunakan email lain.", "error");
                return;
            }

            // Cek keunikan username
            if (!isUnique("username", username)) {
                showMessage("Username sudah digunakan. Silakan pilih username lain.", "error");
                return;
            }

            // Tentukan status: Customer -> 'active', lainnya -> 'pending'
            let status = "pending";
            if (peran === "Customer") {
                status = "active";
            }

            // Buat ID otomatis
            const id = generateID(peran);

            // Buat objek user baru
            const newUser = {
                id: id,
                nama: nama,
                alamat: alamat,
                hp: hp,
                email: email,
                peran: peran,
                username: username,
                password: password,
                status: status
            };

            // Simpan ke localStorage
            saveRegisteredUser(newUser);

            // Tampilkan pesan sukses
            showMessage("Pendaftaran berhasil! ID Anda: " + id + ". Silakan login.", "success");

            // Reset form
            document.getElementById("registerForm").reset();

            // Kembalikan fokus ke nama
            document.getElementById("nama").focus();

            // Jika ingin otomatis redirect, bisa ditambahkan (saat ini biarkan user memilih)
        });
    </script>
