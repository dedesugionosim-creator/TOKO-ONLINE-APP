<!-- Halaman Login Multi-User untuk Pemilik dan Kasir -->
<!-- Tema Cerah dengan Background Gradien Oranye, dilengkapi Toggle Mode Gelap -->

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Toko Grosir</title>
    <!-- Menggunakan Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts untuk tampilan lebih menarik -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== CSS Global ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FF8C00, #FF5E00, #FF4500);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            transition: background 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Animasi gradien bergerak */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partikel dekoratif */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: floatParticle 8s infinite;
            pointer-events: none;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Kontainer utama */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 1;
        }

        /* Kartu login dengan efek glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            transition: all 0.5s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo atau ikon */
        .login-icon {
            font-size: 60px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 25px;
        }

        /* Group input */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .input-field {
            width: 100%;
            padding: 14px 20px;
            padding-left: 45px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            backdrop-filter: blur(5px);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .input-field:focus {
            background: rgba(255,255,255,0.3);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255,140,0,0.6);
        }

        .input-group .input-icon {
            position: absolute;
            left: 15px;
            top: 42px;
            font-size: 18px;
            color: rgba(255,255,255,0.8);
        }

        /* Select dropdown styling */
        .select-field {
            width: 100%;
            padding: 14px 20px;
            padding-left: 45px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: #fff;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .select-field option {
            background: #FF8C00;
            color: #fff;
        }

        .select-field:focus {
            background: rgba(255,255,255,0.3);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255,140,0,0.6);
        }

        /* Tombol login */
        .login-button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            color: #FF5E00;
            background: #ffffff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .login-button:hover {
            background: #FFD700;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            color: #CC4400;
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Link lupa password */
        .forgot-password {
            display: block;
            margin-top: 15px;
            color: #fff;
            font-size: 14px;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.3s;
        }

        .forgot-password:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Toggle tema (cerah/gelap) */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .theme-toggle i {
            font-size: 18px;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.35);
        }

        /* Mode Gelap */
        body.dark-mode {
            background: linear-gradient(135deg, #2D1B00, #4A2800, #1A0F00);
        }

        body.dark-mode .login-card {
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(255,140,0,0.4);
        }

        body.dark-mode .input-field,
        body.dark-mode .select-field {
            background: rgba(0,0,0,0.5);
            border-color: rgba(255,140,0,0.4);
            color: #fff;
        }

        body.dark-mode .input-field:focus,
        body.dark-mode .select-field:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 15px rgba(255,140,0,0.8);
        }

        body.dark-mode .login-button {
            background: #FF8C00;
            color: #fff;
            box-shadow: 0 8px 20px rgba(255,140,0,0.4);
        }

        body.dark-mode .login-button:hover {
            background: #FFA500;
            color: #1A0F00;
        }

        body.dark-mode .theme-toggle {
            background: rgba(0,0,0,0.4);
            border-color: #FF8C00;
        }

        /* Alert pesan error (opsional) */
        .error-message {
            color: #ffcccc;
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        /* Responsif untuk mobile */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Tombol Toggle Mode Cerah / Gelap -->
    <div class="theme-toggle" id="themeToggle" title="Ganti mode tampilan">
        <i class="fas fa-sun" id="themeIcon"></i>
        <span id="themeText">Cerah</span>
    </div>

    <!-- Partikel dekoratif akan ditambahkan oleh JavaScript -->
    <div id="particlesContainer"></div>

    <!-- Kontainer Utama Login -->
    <div class="login-container">
        <div class="login-card">
            <!-- Ikon / Logo -->
            <div class="login-icon">
                <i class="fas fa-store-alt"></i>
            </div>
            <!-- Judul -->
            <h1 class="login-title">Toko Grosir</h1>
            <p class="login-subtitle">Masuk ke akun Anda</p>

            <!-- Pesan error (jika ada) -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Form Login -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Pilih Peran -->
                <div class="input-group">
                    <label for="userRole">Masuk Sebagai</label>
                    <i class="fas fa-user-tag input-icon"></i>
                    <select id="userRole" class="select-field" required>
                        <option value="" disabled selected>-- Pilih Peran --</option>
                        <option value="pemilik">Pemilik Toko</option>
                        <option value="kasir">Kasir</option>
                    </select>
                </div>

                <!-- Username -->
                <div class="input-group">
                    <label for="username">Username</label>
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" class="input-field" placeholder="Masukkan username Anda" required autocomplete="username">
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="input-field" placeholder="Masukkan password Anda" required autocomplete="current-password">
                </div>

                <!-- Tombol Login -->
                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Masuk Sekarang
                </button>
            </form>

            <!-- Lupa Password -->
            <a href="#" class="forgot-password" id="forgotPasswordLink">
                <i class="fas fa-question-circle"></i> Lupa Password?
            </a>
        </div>
    </div>

    <!-- ==================== JavaScript ==================== -->
    <script>
        // Fungsi untuk membuat partikel dekoratif background
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                let particle = document.createElement('div');
                particle.className = 'particle';
                // Ukuran acak antara 10px hingga 50px
                let size = Math.random() * 40 + 10;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                // Posisi acak di layar
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                // Delay animasi acak agar tidak seragam
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(particle);
            }
        }

        // Toggle Mode Cerah / Gelap
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        let isDarkMode = false;

        themeToggle.addEventListener('click', function() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);

            if (isDarkMode) {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Gelap';
            } else {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Cerah';
            }
        });

        // Fungsi validasi dan simulasi login (multi-user)
        function handleLogin(event) {
            event.preventDefault(); // Mencegah form reload halaman

            const role = document.getElementById('userRole').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            // Reset error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            // Validasi sederhana (contoh saja)
            if (!role || !username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Mohon lengkapi semua bidang.';
                return;
            }

            // Simulasi data login (demo) - dalam implementasi nyata, ini diganti dengan API backend
            const users = {
                pemilik: { username: 'pemilik', password: 'pemilik123' },
                kasir: { username: 'kasir', password: 'kasir123' }
            };

            if (users[role] && users[role].username === username && users[role].password === password) {
                // Login berhasil
                // Simpan sesi sementara (localStorage) untuk keperluan demo
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', role);
                localStorage.setItem('username', username);

                // Tampilkan notifikasi sukses (alert, nanti diganti redirect)
                alert('Login berhasil! Anda masuk sebagai ' + (role === 'pemilik' ? 'Pemilik Toko' : 'Kasir') + '. Mengalihkan ke Dasbor...');

                // Arahkan ke halaman dasbor sesuai peran (nantinya di Blok 2 dan seterusnya)
                // Untuk sekarang, redirect ke halaman yang sesuai (contoh)
                if (role === 'pemilik') {
                    window.location.href = 'dasbor-pemilik.html'; // Blok 2 akan dibuat
                } else if (role === 'kasir') {
                    window.location.href = 'dasbor-kasir.html'; // Blok 6 akan dibuat
                }
            } else {
                // Login gagal
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Username atau password salah, atau peran tidak cocok. Silakan coba lagi.';
                // Menggoyangkan kartu login sebagai efek kesalahan
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; /* trigger reflow */
                card.style.animation = 'shake 0.5s ease';
            }
        }

        // Animasi goyang saat login gagal (tambahan)
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(styleSheet);

        // Inisialisasi partikel saat halaman dimuat
        window.onload = function() {
            createParticles();
            // Cek jika ada preferensi tema sebelumnya (localStorage)
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                isDarkMode = true;
                document.body.classList.add('dark-mode');
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Gelap';
            } else {
                // default cerah
                isDarkMode = false;
            }
        };

        // Simpan preferensi tema saat toggle
        themeToggle.addEventListener('click', function() {
            const currentTheme = isDarkMode ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
        });

        // Link lupa password (simulasi)
        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Fitur lupa password akan menghubungi administrator untuk reset. (Simulasi)');
        });
    </script>
<!======= Akhir Blok 1 =======>
	</body>
</html>
