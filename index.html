<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online 2R - Login & Daftar</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* --- Reset & Global --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FFF8F3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        :root {
            --orange-primary: #FF6B00;
            --orange-secondary: #FF8C32;
            --orange-light: #FFA95C;
            --orange-pale: #FFF0E5;
            --orange-gradient: linear-gradient(135deg, #FF6B00, #FF8C32);
            --white: #FFFFFF;
            --gray-500: #9E9E9E;
            --gray-700: #616161;
            --gray-900: #333333;
            --error: #F44336;
            --success: #4CAF50;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.2);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        /* --- Preloader --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }
        .loader {
            width: 50px; height: 50px;
            border: 5px solid var(--orange-pale);
            border-top: 5px solid var(--orange-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Toast --- */
        .toast-container {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 15px 20px;
            border-radius: var(--radius-md);
            color: var(--white);
            font-weight: 500;
            font-size: 14px;
            min-width: 280px;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.warning { background: #FF9800; }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- Container Utama --- */
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .auth-box {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid #f0f0f0;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo i {
            font-size: 48px;
            color: var(--orange-primary);
            display: block;
            margin-bottom: 10px;
        }
        .auth-logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--gray-900);
        }
        .auth-logo h1 span {
            color: var(--orange-primary);
        }
        .auth-logo p {
            color: var(--gray-500);
            font-size: 14px;
            margin-top: 5px;
        }

        /* --- Form --- */
        .auth-error {
            display: none;
            background: #FFEBEE;
            color: var(--error);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }
        .auth-error i { font-size: 18px; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-900);
            margin-bottom: 6px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: var(--radius-md);
            padding: 0 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--orange-primary);
            background: var(--white);
        }
        .input-group i {
            color: var(--gray-500);
            font-size: 18px;
        }
        .input-group input {
            border: none;
            background: transparent;
            padding: 15px 12px;
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }
        .input-group input::placeholder { color: #bbb; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--orange-gradient);
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,107,0,0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--gray-500);
        }
        .auth-footer a {
            color: var(--orange-primary);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .hidden-form {
            display: none !important;
        }

        @media (max-width: 480px) {
            .auth-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader"><div class="loader"></div></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================ -->
    <!-- LOGIN & REGISTER PAGE                         -->
    <!-- ============================================ -->
    <div class="auth-container" id="pageAuth">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-store-alt"></i>
                <h1>Toko Online <span>2R</span></h1>
                <p>Platform Belanja & Layanan Serba Ada</p>
            </div>

            <!-- Error Message -->
            <div class="auth-error" id="authError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="authErrorText">Username atau password salah!</span>
            </div>

            <!-- ========== LOGIN FORM ========== -->
            <form class="auth-form" id="loginForm" onsubmit="prosesLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Masukkan username" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Masukkan password" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top:25px;">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> Masuk
                    </button>
                </div>
                <div class="auth-footer">
                    Belum punya akun? <a onclick="toggleForm('register')">Daftar di sini</a>
                </div>
            </form>

            <!-- ========== REGISTER FORM ========== -->
            <form class="auth-form hidden-form" id="registerForm" onsubmit="prosesRegister(event)">
                <div class="form-group">
                    <label for="regUsername">Username <span style="color:var(--error);">*</span></label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" placeholder="Buat username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password <span style="color:var(--error);">*</span></label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Buat password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regNama">Nama Lengkap <span style="color:var(--error);">*</span></label>
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="regNama" placeholder="Nama lengkap Anda" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email (opsional)</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regRole">Role Akun</label>
                    <div class="input-group" style="padding:0 15px;">
                        <select id="regRole" style="width:100%; border:none; background:transparent; padding:15px 0; font-size:16px; outline:none; font-family:inherit;">
                            <option value="customer">Customer</option>
                            <option value="toko">Toko</option>
                            <option value="ojek">Ojek</option>
                            <option value="pedagang">Pedagang Pasar</option>
                            <option value="codseller">COD Seller</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top:25px;">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> Daftar
                    </button>
                </div>
                <div class="auth-footer">
                    Sudah punya akun? <a onclick="toggleForm('login')">Login di sini</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // DATA AKUN TERSIMPAN DI LOCALSTORAGE
        // ============================================
        function getDataAkun() {
            const data = localStorage.getItem('2r_akun');
            return data ? JSON.parse(data) : [];
        }
        function simpanDataAkun(akun) {
            localStorage.setItem('2r_akun', JSON.stringify(akun));
        }

        // ============================================
        // TOGGLE FORM LOGIN / REGISTER
        // ============================================
        function toggleForm(tipe) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';

            if (tipe === 'register') {
                loginForm.classList.add('hidden-form');
                registerForm.classList.remove('hidden-form');
            } else {
                registerForm.classList.add('hidden-form');
                loginForm.classList.remove('hidden-form');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function tampilkanToast(pesan, tipe = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${tipe}`;
            const icon = tipe === 'success' ? 'fa-check-circle' :
                         tipe === 'error' ? 'fa-times-circle' :
                         'fa-exclamation-triangle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${pesan}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================
        // PROSES LOGIN
        // ============================================
        function prosesLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('authError');
            const errorText = document.getElementById('authErrorText');
            errorDiv.style.display = 'none';

            const akun = getDataAkun();
            const user = akun.find(u => u.username === username && u.password === password);

            if (user) {
                tampilkanToast('Selamat datang, ' + user.nama + '!', 'success');
                // Simpan session
                localStorage.setItem('2r_user', JSON.stringify(user));
                // Kosongkan form
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                // Simulasi redirect
                setTimeout(() => {
                    alert('✅ Login berhasil!\n\nUsername: ' + user.username + '\nRole: ' + user.role + '\n\nAnda sekarang sudah login.');
                }, 600);
            } else {
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Username atau password salah!';
                tampilkanToast('Username atau password salah!', 'error');
            }
        }

        // ============================================
        // PROSES REGISTRASI
        // ============================================
        function prosesRegister(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const nama = document.getElementById('regNama').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const role = document.getElementById('regRole').value;
            const errorDiv = document.getElementById('authError');
            const errorText = document.getElementById('authErrorText');
            errorDiv.style.display = 'none';

            // Validasi
            if (!username || !password || !nama) {
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Username, password, dan nama lengkap harus diisi!';
                tampilkanToast('Data belum lengkap!', 'warning');
                return;
            }
            if (username.length < 4) {
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Username minimal 4 karakter!';
                tampilkanToast('Username minimal 4 karakter!', 'warning');
                return;
            }
            if (password.length < 6) {
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Password minimal 6 karakter!';
                tampilkanToast('Password minimal 6 karakter!', 'warning');
                return;
            }

            // Cek username sudah ada
            let akun = getDataAkun();
            if (akun.find(u => u.username === username)) {
                errorDiv.style.display = 'flex';
                errorText.textContent = 'Username sudah digunakan!';
                tampilkanToast('Username sudah digunakan!', 'error');
                return;
            }

            // Simpan akun baru
            const userBaru = {
                username: username,
                password: password,
                nama: nama,
                email: email || '',
                role: role
            };
            akun.push(userBaru);
            simpanDataAkun(akun);

            tampilkanToast('Akun berhasil dibuat! Silakan login.', 'success');

            // Kosongkan form registrasi
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regNama').value = '';
            document.getElementById('regEmail').value = '';

            // Kembali ke login
            toggleForm('login');
        }

        // ============================================
        // PRELOADER
        // ============================================
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 500);
        });

        // ============================================
        // CEK SESSION SAAT INIT
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            const storedUser = localStorage.getItem('2r_user');
            if (storedUser) {
                const user = JSON.parse(storedUser);
                console.log('Anda sudah login sebagai:', user.nama);
            }
        });

        console.log('✅ Auth (Login + Register) siap.');
    </script>

</body>
</html>
