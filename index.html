<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Toko Online 2R - Login">
    <meta name="theme-color" content="#FF6B00">
    <title>Login - Toko Online 2R</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset & Global */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FF6B00, #FF8C32);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Kotak Login */
        .login-box {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo i {
            font-size: 48px;
            color: #FF6B00;
        }
        .login-logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        .login-logo h1 span {
            color: #FF6B00;
        }
        .login-logo p {
            font-size: 13px;
            color: #9E9E9E;
            margin-top: 5px;
        }

        /* Error Message */
        .login-error {
            background: #F44336;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
            font-size: 14px;
            align-items: center;
            gap: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            font-weight: 500;
            font-size: 14px;
            color: #616161;
            display: block;
            margin-bottom: 5px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #FAFAFA;
            border: 2px solid #EEEEEE;
            border-radius: 8px;
            padding: 0 12px;
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-color: #FF6B00;
        }
        .input-group i {
            color: #BDBDBD;
            font-size: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            background: transparent;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #333;
        }

        /* Tombol Login */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B00, #FF8C32);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            font-size: 12px;
            color: #9E9E9E;
            margin-top: 20px;
        }

        /* Toast Notification (untuk feedback) */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            min-width: 280px;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #F44336; }
        .toast.warning { background: #FF9800; }
        .toast.info { background: #2196F3; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Login Box -->
    <div class="login-box">
        <div class="login-logo">
            <i class="fas fa-store-alt"></i>
            <h1>Toko Online <span>2R</span></h1>
            <p>Platform Belanja & Layanan Serba Ada</p>
        </div>

        <div class="login-error" id="loginError">
            <i class="fas fa-exclamation-circle"></i>
            <span id="loginErrorText">Username atau password salah!</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
        </form>
        <div class="login-footer">
            <p>🔒 Sistem Multi-Akun Terproteksi</p>
            <p style="font-size: 11px; margin-top: 5px;">Demo: superadmin / rahasia123</p>
        </div>
    </div>

    <script>
        // Data dummy (hanya untuk demo)
        const dummyUsers = [
            { username: 'superadmin', password: 'rahasia123', nama: 'Ahmad Fauzi' },
            { username: 'toko1', password: 'tokopass', nama: 'Surya Wijaya' }
        ];

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');

            // Reset error
            errorBox.style.display = 'none';

            if (!username || !password) {
                errorText.textContent = 'Username dan password harus diisi!';
                errorBox.style.display = 'flex';
                return;
            }

            // Cari user
            const user = dummyUsers.find(u => u.username === username && u.password === password);
            if (user) {
                showToast('Selamat datang, ' + user.nama + '!', 'success');
                // Redirect atau tampilkan dashboard sederhana
                setTimeout(() => {
                    // Di sini Anda bisa arahkan ke halaman dashboard
                    // Untuk demo, kita hanya tampilkan alert
                    alert('Login berhasil! Anda akan diarahkan ke dashboard (dalam pengembangan).');
                    // Bisa juga redirect ke dashboard.html jika ada
                }, 500);
                document.getElementById('btnLogin').disabled = true;
                document.getElementById('btnLogin').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memuat...';
            } else {
                errorText.textContent = 'Username atau password salah!';
                errorBox.style.display = 'flex';
                showToast('Login gagal! Periksa kembali username/password.', 'error');
            }
        }
    </script>
</body>
</html>
